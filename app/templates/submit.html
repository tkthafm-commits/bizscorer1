{% extends "base.html" %}
{% block title %}BizScorer - Submit Business{% endblock %}
{% block content %}
<h1>Submit a Business</h1>
<form id="business-form" class="form">
    <div class="form-group">
        <label for="name">Business Name *</label>
        <input type="text" id="name" name="name" required>
    </div>
    <div class="form-group">
        <label for="industry">Industry *</label>
        <select id="industry" name="industry" required>
            <option value="">Select...</option>
            <option>Technology</option>
            <option>Retail</option>
            <option>Healthcare</option>
            <option>Finance</option>
            <option>Manufacturing</option>
            <option>Food & Beverage</option>
            <option>Real Estate</option>
            <option>Education</option>
            <option>Other</option>
        </select>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="annual_revenue">Annual Revenue ($)</label>
            <input type="number" id="annual_revenue" name="annual_revenue" min="0" step="1000">
        </div>
        <div class="form-group">
            <label for="employee_count">Employee Count</label>
            <input type="number" id="employee_count" name="employee_count" min="1">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="years_in_operation">Years in Operation</label>
            <input type="number" id="years_in_operation" name="years_in_operation" min="0">
        </div>
        <div class="form-group">
            <label for="website_url">Website URL</label>
            <input type="url" id="website_url" name="website_url" placeholder="https://...">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="customer_rating">Customer Rating (1-5)</label>
            <input type="number" id="customer_rating" name="customer_rating" min="1" max="5" step="0.1">
        </div>
        <div class="form-group">
            <label for="review_count">Number of Reviews</label>
            <input type="number" id="review_count" name="review_count" min="0">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="profit_margin">Profit Margin (%)</label>
            <input type="number" id="profit_margin" name="profit_margin" step="0.1">
        </div>
        <div class="form-group">
            <label for="debt_to_equity_ratio">Debt-to-Equity Ratio</label>
            <input type="number" id="debt_to_equity_ratio" name="debt_to_equity_ratio" min="0" step="0.01">
        </div>
    </div>
    <div class="form-group">
        <label>
            <input type="checkbox" id="has_compliance_cert" name="has_compliance_cert">
            Has Compliance Certification
        </label>
    </div>
    <button type="submit" class="btn">Score This Business</button>
    <div id="form-message"></div>
</form>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('business-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('form-message');
    msg.textContent = 'Submitting...';
    const form = e.target;
    const data = {
        name: form.name.value,
        industry: form.industry.value,
        has_compliance_cert: form.has_compliance_cert.checked,
    };
    ['annual_revenue', 'employee_count', 'years_in_operation', 'customer_rating',
     'review_count', 'profit_margin', 'debt_to_equity_ratio'].forEach(field => {
        const val = form[field].value;
        if (val !== '') data[field] = parseFloat(val);
    });
    if (form.website_url.value) data.website_url = form.website_url.value;
    try {
        const result = await fetchJSON('/api/businesses/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data),
        });
        window.location.href = '/report/' + result.id;
    } catch (err) {
        msg.textContent = 'Error: ' + err.message;
        msg.style.color = 'red';
    }
});
</script>
{% endblock %}
